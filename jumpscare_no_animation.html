<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Click</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: white;
      color: black;
      font-size: clamp(42px, 10vw, 110px);
      font-weight: 900;
      user-select: none;
      z-index: 10;
    }

    #scareScreen {
      position: fixed;
      inset: 0;
      display: none;
      background: black;
      z-index: 20;
    }

    #scareImage {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    #soundOnlyVideo {
      position: fixed;
      left: -99999px;
      top: -99999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="startScreen">누르세요</div>

  <div id="scareScreen">
    <img id="scareImage" src="다운로드.jpg" alt="" draggable="false" />
  </div>

  <video id="soundOnlyVideo" preload="auto" playsinline>
    <source src="Nightmare scream jumpscare SFX.mp4" type="video/mp4" />
  </video>

  <script>
    const startScreen = document.getElementById("startScreen");
    const scareScreen = document.getElementById("scareScreen");
    const sound = document.getElementById("soundOnlyVideo");

    function start() {
      startScreen.style.display = "none";
      scareScreen.style.display = "block";

      sound.currentTime = 0;
      sound.volume = 1;
      sound.muted = false;
      sound.play().catch(() => {
        // 브라우저가 소리를 막으면 한 번 더 누르면 재생됨
      });
    }

    startScreen.addEventListener("click", start);
    startScreen.addEventListener("touchstart", start, { once: true });
  </script>
</body>
</html>
