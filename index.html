  <script>
    const start = document.getElementById("start");
    const scare = document.getElementById("scare");
    const sound = document.getElementById("sound");

    sound.load();
    sound.volume = 1;
    sound.muted = false;

    let done = false;

    function go(e) {
      if (e) e.preventDefault();
      if (done) return;
      done = true;

      // 누르는 즉시 화면 전환: 애니메이션 없음
      start.style.display = "none";
      scare.style.display = "block";
      document.body.style.background = "black";

      // 휴대폰 자동재생 차단 방지: 사용자가 누른 순간 바로 play
      try {
        sound.currentTime = 0;
      } catch (err) {}

      const p = sound.play();
      if (p && p.catch) {
        p.catch(() => {
          // 그래도 막히는 폰이면 아무 곳이나 한 번 더 누르면 재생
          document.addEventListener("pointerdown", () => {
            sound.play().catch(() => {});
          }, { once: true });
          document.addEventListener("touchend", () => {
            sound.play().catch(() => {});
          }, { once: true });
        });
      }
    }

    start.addEventListener("pointerdown", go, { passive: false });
    start.addEventListener("touchend", go, { passive: false });
    start.addEventListener("click", go);
  </script>
